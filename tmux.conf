# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# I've ported what I need from this plugin to this file
#set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Unnecessary in modern systems
# set -s default-terminal "screen-256color"

set-option -g display-time 1000

# Delay between prefix and command in ms (don't use 0)
set -s escape-time 50

# refresh more often
set-option -g status-interval 5

setw -g monitor-activity on
#set -g visual-activity on

set-option -g focus-events on

# VI keys in Copy mode
setw -g mode-keys vi

# emacs keys in command prompt (tmux-sensible)
set -g status-keys emacs 

# increase scrollback buffer size
set-option -g history-limit 50000

set-window-option -g aggressive-resize on

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Number windows and panes from 1
set -g base-index 1
setw -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display -d300 "Reloaded!"

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h
bind _ split-window -v

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g mouse on

set -g status-style fg=white,bold,bg=black
set -g message-style fg=white,bold,bg=brightblack

setw -g window-status-style fg=cyan,bg=black
setw -g window-status-current-style fg=white,bold,bg=purple

setw -g pane-border-style fg=green,bg=black
setw -g pane-active-border-style fg=white,bg=yellow

setw -g window-style fg=colour240,bg=colour235
setw -g window-active-style fg=white,bg=terminal

set -g status-left-length 40
#set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P "
set -g status-left "#[fg=green][#S] #[fg=yellow]\"#H\""
set -g status-right "#[fg=cyan]%d %b %R"

set -g status-justify centre

bind Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# load macOS-specific settings
if-shell "uname | grep -q Darwin" "source-file ~/.tmux.mac.conf"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
