# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible' # I've ported what I need from this plugin to this file
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Tokyo Night theme and config
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_variation 'night'
set -g @theme_plugins 'datetime,battery'
set -g @theme_transparent_status_bar 'true'
set -g @theme_left_separator ''
set -g @theme_right_separator ''
set -g @theme_transparent_left_separator_inverse ''
set -g @theme_transparent_right_separator_inverse ''
set -g @theme_plugin_datetime_format '%m-%d %a | %H:%M'

# set -g status-justify centre # doesn't go well with the Tokyo Night theme

# Unnecessary in modern systems
# set -s default-terminal "screen-256color"

set-option -g display-time 1000

# Delay between prefix and command in ms (don't use 0)
set -s escape-time 50

# refresh status more often
set-option -g status-interval 5

setw -g monitor-activity on
#set -g visual-activity on

set-option -g focus-events on

# VI keys in Copy mode
setw -g mode-keys vi

# emacs keys in command prompt (tmux-sensible)
set -g status-keys emacs 

# increase scrollback buffer size
set-option -g history-limit 50000

set-window-option -g aggressive-resize on

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Number windows and panes from 1
set -g base-index 1
setw -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display -d500 "Reloaded!"

# bind c new-window -c "#{pane_current_path}" # Creates new windows in same directory

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h
bind _ split-window -v

unbind %
unbind '"'

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

unbind Left
unbind Down
unbind Up
unbind Right

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g mouse on

# Distinguish inactive panes only, let theme handle active ones
setw -g window-style "bg=#16161e,fg=#787c99"         # Darker background, dimmed text for inactive
setw -g window-active-style "bg=terminal,fg=terminal" # Let terminal/theme colors show through

bind Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# load macOS-specific settings
if-shell "uname | grep -q Darwin" "source-file ~/.tmux.mac.conf"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
