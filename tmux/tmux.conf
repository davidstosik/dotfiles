# tmux configuration — David Stosik
# Requires: TPM (auto-installed by install.sh)

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'omerxx/tmux-sessionx'

# Tokyo Night theme
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_variation 'night'
set -g @theme_plugins 'datetime,battery'
set -g @theme_transparent_status_bar 'true'
set -g @theme_left_separator ''
set -g @theme_right_separator ''
set -g @theme_transparent_left_separator_inverse ''
set -g @theme_transparent_right_separator_inverse ''
set -g @theme_plugin_datetime_format '%m-%d %a | %H:%M'

# --- General ---
set-option -g display-time 1000
set -s escape-time 50
set-option -g status-interval 5
set-option -g history-limit 50000
set-option -g focus-events on
set-window-option -g aggressive-resize on
setw -g monitor-activity on

# --- Keybindings ---

# Prefix: Ctrl-A
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# VI keys in copy mode, emacs keys in command prompt
setw -g mode-keys vi
set -g status-keys emacs

# Reload config
bind r source-file ~/.tmux.conf \; display -d500 "Reloaded!"

# Windows
bind c new-window -c "#{pane_current_path}"
bind C new-window -c "~"

# Splits (intuitive: \ for vertical, - for horizontal)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h
bind _ split-window -v
unbind %
unbind '"'

# Pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
unbind Left
unbind Down
unbind Up
unbind Right

# Window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
bind Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# Session switching (sessionx)
unbind C-o
set -g @sessionx-bind 'C-o'
bind-key -r O rotate-window

# Toggle sync panes (from v3 — useful for multi-server work)
bind y set synchronize-panes\; display 'synchronize-panes #{?synchronize-panes,on,off}'

# --- Numbering ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Mouse ---
set -g mouse on

# --- Appearance ---
# Dim inactive panes (active pane uses terminal/theme colors)
setw -g window-style "bg=#16161e,fg=#787c99"
setw -g window-active-style "bg=terminal,fg=terminal"

# --- Platform-specific ---
if-shell "uname | grep -q Darwin" "source-file ~/.tmux.mac.conf"

# --- Initialize TPM (must be last line) ---
run '~/.tmux/plugins/tpm/tpm'
